name: CI/CD Pipeline to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Execute deployment on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_REPO
          timeout: 120s
          script: |
            set -e
            echo "Connected to EC2. Starting deployment..."
            
            PROJECT_DIR="$HOME/docker-github-actions-cicd"
            cd "$PROJECT_DIR"

            # Pull latest changes from git
            git pull origin main

            # Create runtime .env file for docker compose
            cat > .env <<EOF
            GITHUB_REPOSITORY=${GITHUB_REPO}
            EOF

            # Authenticate Docker with GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Run deployment script and health check
            chmod +x ./scripts/deploy.sh ./scripts/health-check.sh
            ./scripts/deploy.sh
            ./scripts/health-check.sh
            
            echo "Deployment successfully completed!"
