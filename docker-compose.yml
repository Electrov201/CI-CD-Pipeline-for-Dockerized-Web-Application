# =============================================================
#  docker-compose.yml — Production Configuration
#
#  Usage:  docker compose up -d
#  Image:  Pulled from GitHub Container Registry (GHCR)
#  Access: http://<your-EC2-public-IP>
# =============================================================

services:
  nginx:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/docker-github-actions-cicd}:latest
    container_name: nginx-app
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      # Nginx access & error logs (persisted on host)
      - nginx-logs:/var/log/nginx

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - web

# ── Volumes ───────────────────────────────────────────────────
volumes:
  nginx-logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  web:
    driver: bridge
